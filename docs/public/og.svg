<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0908"/>

  <!-- Grain texture -->
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch"/>
  </filter>
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.02"/>

  <!-- Horizontal strata lines -->
  <line x1="0" y1="140" x2="1200" y2="140" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="280" x2="1200" y2="280" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="560" x2="1200" y2="560" stroke="white" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Ambient glow -->
  <circle cx="600" cy="250" r="350" fill="#edc462" opacity="0.03"/>
  <circle cx="600" cy="250" r="200" fill="#edc462" opacity="0.02"/>

  <!-- Tick marks — left edge -->
  <line x1="0" y1="0" x2="0" y2="8" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="140" x2="0" y2="148" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="280" x2="0" y2="288" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="420" x2="0" y2="428" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="560" x2="0" y2="568" stroke="white" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Tick marks — right edge -->
  <line x1="1200" y1="0" x2="1200" y2="8" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="1200" y1="140" x2="1200" y2="148" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="1200" y1="280" x2="1200" y2="288" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="1200" y1="420" x2="1200" y2="428" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="1200" y1="560" x2="1200" y2="568" stroke="white" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Eyebrow -->
  <text x="100" y="200" fill="#5e5549" font-family="monospace" font-size="12" letter-spacing="4" text-transform="uppercase">TYPE-SAFE RPC FOR TYPESCRIPT</text>

  <!-- Title — "The RPC Framework" -->
  <text x="100" y="300" fill="#ede6db" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-style="italic" letter-spacing="-1">The RPC Framework</text>

  <!-- Title — "for the Web" -->
  <text x="100" y="380" fill="#edc462" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-style="italic" letter-spacing="-1">for the Web</text>

  <!-- Subtitle -->
  <text x="100" y="440" fill="#b5a892" font-family="sans-serif" font-size="20" font-weight="300">Compiled pipelines · Single package · Every runtime</text>

  <!-- Layer indicators — bottom -->
  <g transform="translate(100, 520)">
    <circle cx="0" cy="0" r="4" fill="#edc462"/>
    <text x="14" y="4" fill="#5e5549" font-family="monospace" font-size="11" letter-spacing="2">GUARDS</text>

    <circle cx="130" cy="0" r="4" fill="#7fb5ac"/>
    <text x="144" y="4" fill="#5e5549" font-family="monospace" font-size="11" letter-spacing="2">PIPELINE</text>

    <circle cx="280" cy="0" r="4" fill="#bfa0cc"/>
    <text x="294" y="4" fill="#5e5549" font-family="monospace" font-size="11" letter-spacing="2">TRANSPORT</text>
  </g>

  <!-- Install command — right side -->
  <g transform="translate(750, 480)">
    <rect x="0" y="0" width="350" height="44" rx="8" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06"/>
    <text x="20" y="28" fill="#5e5549" font-family="monospace" font-size="14">$</text>
    <text x="40" y="28" fill="#ede6db" font-family="monospace" font-size="14">pnpm add katman</text>
  </g>

  <!-- Border -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
</svg>
