<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#0c0a07"/>
      <stop offset="100%" stop-color="#0a0908"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="860" cy="290" rx="400" ry="280" fill="#edc462" opacity="0.035" filter="url(#softglow)"/>

  <!-- ═══ THREE STACKED LAYER CARDS ═══ -->

  <!-- Layer 3: TRANSPORT (bottom, widest) -->
  <g transform="translate(570, 340)">
    <rect x="0" y="0" width="570" height="88" rx="14" fill="#0e0d0a" stroke="white" stroke-opacity="0.06"/>
    <text x="28" y="34" fill="#bfa0cc" font-family="sans-serif" font-size="13" font-weight="700" letter-spacing="2.5" text-transform="uppercase">TRANSPORT</text>
    <text x="28" y="64" fill="#9a8e7e" font-family="'Menlo', 'Consolas', monospace" font-size="17" letter-spacing="0.3">HTTP · HTTP/2 · WebSocket · SSE</text>
  </g>

  <!-- Layer 2: PIPELINE (middle) -->
  <g transform="translate(610, 240)">
    <rect x="0" y="0" width="530" height="92" rx="14" fill="#11100d" stroke="#edc462" stroke-opacity="0.12"/>
    <text x="28" y="34" fill="#7fb5ac" font-family="sans-serif" font-size="13" font-weight="700" letter-spacing="2.5">PIPELINE</text>
    <text x="28" y="62" fill="#ede6db" font-family="'Menlo', 'Consolas', monospace" font-size="18" font-weight="600">guard → wrap → resolve</text>
    <text x="28" y="82" fill="#6b6058" font-family="sans-serif" font-size="13" font-weight="400" letter-spacing="0.2">compiled at startup · zero closures per request</text>
  </g>

  <!-- Layer 1: CLIENT (top, brightest) -->
  <g transform="translate(650, 142)">
    <rect x="0" y="0" width="490" height="88" rx="14" fill="#141310" stroke="#edc462" stroke-opacity="0.22"/>
    <text x="28" y="34" fill="#edc462" font-family="sans-serif" font-size="13" font-weight="700" letter-spacing="2.5">CLIENT</text>
    <text x="28" y="64" fill="#ede6db" font-family="'Menlo', 'Consolas', monospace" font-size="19" font-weight="600">createClient&lt;AppRouter&gt;(link)</text>
  </g>

  <!-- Connection lines between layers -->
  <line x1="880" y1="234" x2="880" y2="242" stroke="#edc462" stroke-opacity="0.1" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="860" y1="332" x2="860" y2="340" stroke="#edc462" stroke-opacity="0.07" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- ═══ LEFT SIDE — Text ═══ -->

  <!-- Logo + name -->
  <g transform="translate(72, 72)">
    <rect width="48" height="48" rx="11" fill="#edc462"/>
    <circle cx="24" cy="24" r="7" fill="#0a0908"/>
    <text x="62" y="36" fill="#ede6db" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-style="italic" letter-spacing="-0.5">Silgi</text>
  </g>

  <!-- Title -->
  <text x="72" y="240" fill="#ede6db" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-style="italic" letter-spacing="-3">Build in</text>
  <text x="72" y="350" fill="#edc462" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-style="italic" letter-spacing="-3" filter="url(#glow)">layers.</text>

  <!-- Subtitle -->
  <text x="76" y="415" fill="#8a7e6e" font-family="sans-serif" font-size="24" font-weight="400" letter-spacing="0.2">Type-safe RPC framework for TypeScript</text>

  <!-- Install command -->
  <g transform="translate(72, 460)">
    <rect x="0" y="0" width="380" height="52" rx="10" fill="#0e0d0a" stroke="white" stroke-opacity="0.06"/>
    <text x="20" y="34" fill="#5e5549" font-family="'Menlo', 'Consolas', monospace" font-size="19">$</text>
    <text x="42" y="34" fill="#ede6db" font-family="'Menlo', 'Consolas', monospace" font-size="19">pnpm add silgi</text>
  </g>

  <!-- Bottom tagline -->
  <text x="76" y="572" fill="#4a4238" font-family="sans-serif" font-size="16" font-weight="400" letter-spacing="0.3">Compiled pipelines · Single package · Every runtime</text>
  <text x="1128" y="572" fill="#3d3830" font-family="sans-serif" font-size="14" text-anchor="end">silgi.dev</text>

  <!-- Border -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="white" stroke-opacity="0.03"/>
</svg>
